<div class="layout">
  <nav class="sidebar">
    <div class="logo">
      <i class="pi pi-check-circle"></i>
      <span>HabitTracker</span>
    </div>

    <ul class="nav">
      <li>
        <a
          pRipple
          [routerLink]="['']"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }">
          <i class="pi pi-home"></i> Dashboard
        </a>
      </li>
      <li>
        <a pRipple [routerLink]="['/today']" routerLinkActive="active">
          <i class="pi pi-check-square"></i> Heute
        </a>
      </li>
      <li>
        <a pRipple [routerLink]="['/habits']" routerLinkActive="active">
          <i class="pi pi-list"></i> Tasks
        </a>
      </li>
      <li>
        <a pRipple [routerLink]="['/settings']" routerLinkActive="active">
          <i class="pi pi-cog"></i> Einstellungen
          @if (updateState.isUpdateAvailable()) {
            <i class="pi pi-circle-fill badge"></i>
          }
        </a>
      </li>
    </ul>
  </nav>

  <div class="wrapper">
    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
