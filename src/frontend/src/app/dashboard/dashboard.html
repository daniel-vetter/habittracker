<div class="dashboard">
  <p-panel>
    <ng-template pTemplate="header">
      <div class="header"><h2>Dashboard</h2></div>
    </ng-template>

    <p class="subtitle">Erfüllung der letzten 7 Tage</p>

    @if (days().length === 0) {
      <p class="muted">Noch keine Daten — leg los auf der Heute-Seite! 🚀</p>
    } @else {
      <div class="bubbles">
        @for (day of days(); track day.date) {
          <div class="bubble-col">
            @if (hasTasks(day)) {
              <p-knob
                [ngModel]="percentInt(day)"
                [readonly]="true"
                [size]="84"
                [strokeWidth]="10"
                valueTemplate="{value}%"
                [valueColor]="color(day)"
                rangeColor="var(--p-surface-200)" />
            } @else {
              <div class="empty">–</div>
            }
            <span class="wd">{{ weekday(day.date!) }}</span>
            <span class="dt">{{ dayNumber(day.date!) }}</span>
          </div>
        }
      </div>
    }
  </p-panel>
</div>
