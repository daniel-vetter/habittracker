name: Build & Test

on:
  push:
    branches: ['**']
  schedule:
    - cron: '15 18 * * 2'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build Docker Image
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t habittracker:${{ github.sha }} --build-arg BUILD_VERSION=${{ github.sha }} --build-arg "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" .

      - name: Save Docker image
        run: docker save habittracker:${{ github.sha }} -o /tmp/docker-image.tar

      - name: Cache Docker image
        uses: actions/cache/save@v5
        with:
          path: /tmp/docker-image.tar
          key: docker-image-${{ github.sha }}

  push:
    name: Push Docker Image
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Restore Docker image
        uses: actions/cache/restore@v5
        with:
          path: /tmp/docker-image.tar
          key: docker-image-${{ github.sha }}

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push
        run: |
          GHCR="ghcr.io/${{ github.repository }}"
          docker tag habittracker:${{ github.sha }} $GHCR:latest
          docker tag habittracker:${{ github.sha }} $GHCR:${{ github.sha }}
          docker push $GHCR:latest
          docker push $GHCR:${{ github.sha }}
          echo "### Pushed \`$GHCR:latest\` and \`$GHCR:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [actions, csharp, javascript-typescript]
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
